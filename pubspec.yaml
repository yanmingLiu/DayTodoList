name: todo_app
description: Developer journal app built with Flutter.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  drift: ^2.32.0
  drift_flutter: ^0.3.0
  google_fonts: ^6.3.1
  intl: ^0.20.2
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  table_calendar: ^3.2.0

dev_dependencies:
  build_runner: ^2.4.15
  drift_dev: ^2.32.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
